<!DOCTYPE html>
<html lang="en" data-mode="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">
<meta name="description" content="Common Work — shared work items moving through seven stages toward resolution.">
<title>Daybook · work · Techne</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<style>
:root {
  --serif: "Libre Baskerville", Georgia, serif;
  --mono:  "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:24px; --s6:32px; --s7:48px; --s8:64px;
  --dur:.4s; --micro:.15s; --ease:cubic-bezier(.4,0,.2,1);

  /* stage colors (from architecture) */
  --st-captured:#b45309;
  --st-offered:#d97706;
  --st-held:#ea580c;
  --st-standing:#dc2626;
  --st-socialized:#9333ea;
  --st-resolved:#2563eb;
  --st-composted:#52525b;
}
html[data-mode="dark"] {
  --bg:#0F0F12; --inset:#08080A; --surface:#16161B; --raised:#232329;
  --line:#2A2A30; --rule:#3A3A42;
  --heading:#E8E4DF; --text:#CFCBC4; --muted:#8A857E; --faint:#5A554F;
  --blue:#6A8AC4; --blue-t:#97B5E8; --ember:#C4956A; --ember-t:#D4A57A;
  --ok:#6A9A6A; --warn:#C46A6A;
}
html[data-mode="light"] {
  --bg:#F7F5F0; --inset:#EBE7DF; --surface:#FCFBF8; --raised:#FEFDFB;
  --line:#D8D3C8; --rule:#9A958A;
  --heading:#1A1A1F; --text:#2E2C28; --muted:#646058; --faint:#A39E92;
  --blue:#4A6FB0; --blue-t:#39588F; --ember:#8A6A4A; --ember-t:#6F5436;
  --ok:#4A7A4A; --warn:#A84F4C;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { color-scheme: dark light; }
body {
  background: var(--bg); color: var(--text);
  font: 400 17px/1.72 var(--serif); min-height: 100vh;
  transition: background-color var(--dur) var(--ease), color var(--dur) var(--ease);
}
a { color: var(--blue-t); text-decoration: none; }
a:hover { text-decoration: underline; }
:focus-visible { outline: 2px solid var(--blue); outline-offset: 3px; }

/* topbar */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 var(--s5); height: 52px; border-bottom: 1px solid var(--line);
  position: sticky; top: 0; background: var(--bg); z-index: 100;
}
.topbar-left { display: flex; align-items: center; gap: var(--s3); }
.brand { font: 500 12px/1 var(--mono); color: var(--heading); text-decoration: none; }
.brand:hover { color: var(--ember-t); text-decoration: none; }
.sep { font: 400 12px/1 var(--mono); color: var(--faint); }
.topbar-sub { font: 400 12px/1 var(--mono); color: var(--muted); }
.topbar-right { display: flex; align-items: center; gap: var(--s3); }
.nav-link { font: 500 11px/1 var(--mono); color: var(--muted); text-decoration: none; padding: 6px 10px; border-radius: 2px; }
.nav-link:hover { color: var(--heading); text-decoration: none; }
.mode-btn {
  font: 500 11px/1 var(--mono); color: var(--muted); background: var(--surface);
  border: 1px solid var(--rule); border-radius: 2px; padding: 7px 14px; cursor: pointer;
}
.mode-btn:hover { background: var(--raised); color: var(--heading); }

.wrap { max-width: 780px; margin: 0 auto; padding: var(--s6) var(--s5) var(--s8); }

/* stage strip */
.stage-strip {
  display: flex; gap: 0; margin: 0 0 var(--s6);
  border: 1px solid var(--line); border-radius: 2px; overflow: hidden;
  font: 500 10px/1 var(--mono); text-transform: uppercase; letter-spacing: .06em;
}
.stage-pill {
  flex: 1; padding: 10px 6px; text-align: center; color: #fff; cursor: pointer;
  opacity: 0.55; transition: opacity .15s;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.stage-pill:hover { opacity: 0.8; }
.stage-pill.active { opacity: 1; }
.stage-pill[data-stage="captured"]   { background: var(--st-captured); }
.stage-pill[data-stage="offered"]    { background: var(--st-offered); }
.stage-pill[data-stage="held"]       { background: var(--st-held); }
.stage-pill[data-stage="standing"]   { background: var(--st-standing); }
.stage-pill[data-stage="socialized"] { background: var(--st-socialized); }
.stage-pill[data-stage="resolved"]   { background: var(--st-resolved); }
.stage-pill[data-stage="composted"]  { background: var(--st-composted); }

/* view toggle */
.view-toggle {
  display: flex; gap: var(--s2); margin-bottom: var(--s5);
  font: 500 11px/1 var(--mono);
}
.view-btn {
  padding: 7px 14px; border: 1px solid var(--rule); border-radius: 2px;
  background: transparent; color: var(--muted); cursor: pointer;
}
.view-btn.active { background: var(--surface); color: var(--heading); border-color: var(--blue); }

/* day-head */
.day-head { margin-bottom: var(--s6); }
.kicker { font: 500 10px/1 var(--mono); color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-bottom: var(--s2); }
.day-head h1 { font: 700 28px/1.1 var(--serif); color: var(--heading); margin-bottom: var(--s2); }
.day-meta { display: flex; align-items: center; gap: var(--s4); font: 400 13px/1 var(--mono); color: var(--muted); }
.create-link {
  font: 600 11px/1 var(--mono); color: var(--ok); text-decoration: none;
  border: 1px solid var(--ok); border-radius: 2px; padding: 7px 14px;
  text-transform: uppercase; letter-spacing: .06em;
}
.create-link:hover { text-decoration: none; opacity: .8; }

/* status */
.status { font: 400 13px/1.5 var(--mono); padding: var(--s3) var(--s4); border-radius: 2px; margin-bottom: var(--s4); display: none; }
.status.error { background: color-mix(in srgb, var(--warn) 15%, transparent); color: var(--warn); border: 1px solid var(--warn); display: block; }
.status.ok    { background: color-mix(in srgb, var(--ok)   15%, transparent); color: var(--ok);   border: 1px solid var(--ok);   display: block; }

/* work cards */
.items-wrap { display: flex; flex-direction: column; gap: var(--s4); }
.item-card {
  background: var(--surface); border: 1px solid var(--line); border-radius: 3px;
  padding: var(--s5); position: relative;
  border-left: 3px solid var(--line);
}
.item-card[data-stage="captured"]   { border-left-color: var(--st-captured); }
.item-card[data-stage="offered"]    { border-left-color: var(--st-offered); }
.item-card[data-stage="held"]       { border-left-color: var(--st-held); }
.item-card[data-stage="standing"]   { border-left-color: var(--st-standing); }
.item-card[data-stage="socialized"] { border-left-color: var(--st-socialized); }
.item-card[data-stage="resolved"]   { border-left-color: var(--st-resolved); }
.item-card[data-stage="composted"]  { border-left-color: var(--st-composted); }

.item-header { display: flex; align-items: flex-start; gap: var(--s3); margin-bottom: var(--s2); }
.item-title { font: 600 16px/1.3 var(--serif); color: var(--heading); flex: 1; }
.item-kind {
  font: 500 9px/1 var(--mono); text-transform: uppercase; letter-spacing: .08em;
  color: var(--muted); border: 1px solid var(--rule); border-radius: 2px;
  padding: 4px 8px; white-space: nowrap; flex-shrink: 0;
}
.item-stage-tag {
  font: 500 9px/1 var(--mono); text-transform: uppercase; letter-spacing: .08em;
  border-radius: 2px; padding: 4px 8px; white-space: nowrap; flex-shrink: 0;
  color: #fff;
}
.item-desc { font: 400 14px/1.6 var(--serif); color: var(--text); margin-bottom: var(--s3); }
.item-desc p { margin-bottom: var(--s2); }
.item-meta { font: 400 11px/1.5 var(--mono); color: var(--muted); display: flex; gap: var(--s4); flex-wrap: wrap; }
.item-actions { margin-top: var(--s4); display: flex; gap: var(--s2); flex-wrap: wrap; }
.stage-btn {
  font: 500 10px/1 var(--mono); text-transform: uppercase; letter-spacing: .06em;
  padding: 8px 14px; border-radius: 2px; border: 1px solid var(--rule);
  background: transparent; color: var(--muted); cursor: pointer;
}
.stage-btn:hover { color: var(--heading); border-color: var(--faint); }
.stage-btn.advance { color: var(--ok); border-color: var(--ok); }
.stage-btn.advance:hover { background: color-mix(in srgb, var(--ok) 12%, transparent); }
.stage-btn.retreat { color: var(--warn); border-color: var(--warn); }
.stage-btn.retreat:hover { background: color-mix(in srgb, var(--warn) 12%, transparent); }

.empty-msg { padding: var(--s7) 0; font: 400 15px/1.72 var(--serif); color: var(--muted); text-align: center; }

/* observer notice */
.observer-notice {
  background: var(--inset); border: 1px solid var(--line); border-radius: 2px;
  padding: var(--s4) var(--s5); font: 400 13px/1.5 var(--mono); color: var(--muted);
  margin-bottom: var(--s5);
}

/* transition history */
.transitions { margin-top: var(--s4); }
.transitions-toggle { font: 500 10px/1 var(--mono); text-transform: uppercase; letter-spacing: .06em; color: var(--faint); cursor: pointer; border: none; background: none; padding: 0; }
.transitions-toggle:hover { color: var(--muted); }
.transitions-list { margin-top: var(--s3); border-left: 2px solid var(--line); padding-left: var(--s4); display: none; }
.transitions-list.open { display: block; }
.transition-row { display: flex; gap: var(--s3); font: 400 11px/1.5 var(--mono); color: var(--muted); padding: 4px 0; }
.transition-from { color: var(--faint); }
.transition-arrow { color: var(--faint); }
.transition-to { color: var(--heading); }
.transition-by { color: var(--ember-t); }
.transition-at { color: var(--faint); font-size: 10px; }

/* ── Create form ─────────────────────────────────────────── */
.create-form {
  background: var(--surface); border: 1px solid var(--line); border-radius: 3px;
  padding: var(--s6); margin-bottom: var(--s6); display: none;
}
.create-form.open { display: block; }
.form-title { font: 700 17px/1.2 var(--serif); color: var(--heading); margin-bottom: var(--s5); }
.field { display: flex; flex-direction: column; gap: var(--s2); margin-bottom: var(--s4); }
.field-label { font: 500 11px/1 var(--mono); text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
.field-input, .field-select, .field-textarea {
  font: 400 15px/1.6 var(--serif); background: var(--inset); color: var(--text);
  border: 1px solid var(--rule); border-radius: 2px; padding: var(--s3) var(--s4);
  width: 100%;
}
.field-input:focus, .field-select:focus, .field-textarea:focus {
  outline: none; border-color: var(--blue);
}
.field-textarea { min-height: 100px; resize: vertical; }
.form-actions { display: flex; gap: var(--s3); margin-top: var(--s5); }
.btn {
  font: 600 11px/1 var(--mono); text-transform: uppercase; letter-spacing: .06em;
  padding: 12px 22px; border-radius: 2px; border: 1px solid; cursor: pointer;
}
.btn-primary { background: var(--ok); color: #fff; border-color: var(--ok); }
.btn-primary:hover { opacity: .85; }
.btn-cancel { background: transparent; color: var(--muted); border-color: var(--rule); }
.btn-cancel:hover { color: var(--heading); }

/* ── Settings panel ─────────────────────────────────────── */
.settings-panel {
  background: var(--inset); border: 1px solid var(--rule); border-radius: 3px;
  padding: var(--s5); margin-bottom: var(--s5); display: none;
}
.settings-panel.open { display: block; }
.settings-title { font: 500 11px/1 var(--mono); text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: var(--s4); }
</style>
</head>
<body>

<nav class="topbar">
  <div class="topbar-left">
    <a href="/" class="brand">Techne</a>
    <span class="sep">/</span>
    <span class="topbar-sub">work</span>
  </div>
  <div class="topbar-right">
    <a href="/daybook/today/" class="nav-link">today</a>
    <a href="/daybook/archive/" class="nav-link">archive</a>
    <a href="/daybook/matters/" class="nav-link">matters</a>
    <a href="/daybook/write/" class="nav-link" id="writeLink">write</a>
    <button class="mode-btn" id="modeBtn">light</button>
  </div>
</nav>

<div class="wrap">
  <div id="globalStatus" class="status"></div>

  <!-- settings panel -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-title">Sign in</div>
    <div id="settingsSignedIn" style="display:none">
      <div class="field">
        <span class="field-label">Signed in as <span id="signedInAs"></span></span>
      </div>
      <div class="form-actions">
        <button class="btn btn-cancel" id="signOutBtn">Sign out</button>
      </div>
    </div>
    <div id="settingsSignInForm">
      <div class="field">
        <label class="field-label" for="emailInput">Email</label>
        <input class="field-input" type="email" id="emailInput" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label class="field-label" for="passwordInput">Password</label>
        <input class="field-input" type="password" id="passwordInput" placeholder="password" autocomplete="current-password">
      </div>
      <div id="settingsStatus" class="status"></div>
      <div class="form-actions">
        <button class="btn btn-primary" id="signInBtn">Sign in</button>
      </div>
    </div>
  </div>

  <!-- observer notice -->
  <div id="observerNotice" class="observer-notice" style="display:none;">
    Observer view — showing active work items. <a href="/daybook/write/">Sign in</a> to create or advance items.
  </div>

  <div class="day-head">
    <div class="kicker">Daybook</div>
    <h1>Common Work</h1>
    <div class="day-meta">
      <span id="itemCount">loading…</span>
      <a href="#" class="create-link" id="createToggle" style="display:none;">+ capture</a>
      <a href="#" class="nav-link" id="settingsLink" style="font-size:11px; padding: 4px 8px;">settings</a>
    </div>
  </div>

  <!-- stage strip -->
  <div class="stage-strip" id="stageStrip">
    <div class="stage-pill active" data-stage="all">All</div>
    <div class="stage-pill" data-stage="captured">captured</div>
    <div class="stage-pill" data-stage="offered">offered</div>
    <div class="stage-pill" data-stage="held">held</div>
    <div class="stage-pill" data-stage="standing">standing</div>
    <div class="stage-pill" data-stage="socialized">socialized</div>
    <div class="stage-pill" data-stage="resolved">resolved</div>
    <div class="stage-pill" data-stage="composted">composted</div>
  </div>

  <!-- create form -->
  <div class="create-form" id="createForm">
    <div class="form-title">Capture new work item</div>
    <div class="field">
      <label class="field-label" for="wTitle">Title <span style="color:var(--warn)">*</span></label>
      <input class="field-input" type="text" id="wTitle" placeholder="Short name for this work">
    </div>
    <div class="field">
      <label class="field-label" for="wKind">Kind</label>
      <select class="field-select" id="wKind">
        <option value="task">task — discrete action to be done</option>
        <option value="decision">decision — something the collective must decide</option>
        <option value="question">question — inquiry that needs resolution</option>
        <option value="project">project — multi-step container</option>
      </select>
    </div>
    <div class="field">
      <label class="field-label" for="wDesc">Description</label>
      <textarea class="field-textarea" id="wDesc" placeholder="Full description of the work. Markdown supported."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" id="createBtn">Capture</button>
      <button class="btn btn-cancel" id="cancelCreate">Cancel</button>
    </div>
  </div>

  <!-- items list -->
  <div class="items-wrap" id="itemsWrap">
    <div class="empty-msg" id="loadingMsg">Loading work items…</div>
  </div>

</div>

<script>
(function () {
  'use strict';

  var SB_URL    = 'https://kxprevuqghixwspucfqo.supabase.co';
  var SB_ANON   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cHJldnVxZ2hpeHdzcHVjZnFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNjA3NTYsImV4cCI6MjA5ODkzNjc1Nn0.N8M9iaIdM1Eg_JGAZj54yStsrCIDYL9wi1RKSTHX4qI';
  var SB_REST   = SB_URL + '/rest/v1';
  var SB_AUTH   = SB_URL + '/auth/v1';
  var TOKEN_KEY = 'daybook-sb-token';

  function sbHeaders(token) {
    var h = { 'apikey': SB_ANON, 'Content-Type': 'application/json' };
    if (token) h['Authorization'] = 'Bearer ' + token;
    return h;
  }

  var STAGES = ['captured','offered','held','standing','socialized','resolved','composted'];
  var STAGE_COLORS = {
    captured:   '#b45309',
    offered:    '#d97706',
    held:       '#ea580c',
    standing:   '#dc2626',
    socialized: '#9333ea',
    resolved:   '#2563eb',
    composted:  '#52525b'
  };
  var STAGE_LABELS = {
    captured:   'captured — noticed',
    offered:    'offered — proposed',
    held:       'held — in work',
    standing:   'standing — for review',
    socialized: 'socialized — acknowledged',
    resolved:   'resolved — complete',
    composted:  'composted — retired'
  };
  var TERMINALS = ['resolved','composted'];

  // Valid next stages per architecture advancement rules
  var NEXT_STAGES = {
    captured:   ['offered', 'composted'],
    offered:    ['held', 'composted'],
    held:       ['standing', 'composted'],
    standing:   ['socialized', 'held', 'composted'],
    socialized: ['resolved', 'composted'],
    resolved:   [],
    composted:  []
  };

  /* ── mode toggle ── */
  var root = document.documentElement;
  var modeBtn = document.getElementById('modeBtn');
  var initMode = localStorage.getItem('techne-mode') || 'dark';
  root.setAttribute('data-mode', initMode);
  modeBtn.textContent = initMode === 'dark' ? 'light' : 'dark';
  modeBtn.addEventListener('click', function () {
    var next = root.getAttribute('data-mode') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-mode', next);
    localStorage.setItem('techne-mode', next);
    modeBtn.textContent = next === 'dark' ? 'light' : 'dark';
  });

  /* ── status ── */
  var statusEl = document.getElementById('globalStatus');
  function setStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = 'status ' + (type || '');
  }
  function clearStatus() { statusEl.className = 'status'; statusEl.textContent = ''; }

  /* ── settings panel ── */
  var settingsPanel = document.getElementById('settingsPanel');

  function updateSettingsPanel() {
    var token  = localStorage.getItem(TOKEN_KEY);
    var author = localStorage.getItem('daybook-author') || '';
    var signedInDiv  = document.getElementById('settingsSignedIn');
    var signInForm   = document.getElementById('settingsSignInForm');
    if (token) {
      signedInDiv.style.display = 'block';
      signInForm.style.display  = 'none';
      document.getElementById('signedInAs').textContent = author || 'member';
    } else {
      signedInDiv.style.display = 'none';
      signInForm.style.display  = 'block';
    }
  }

  document.getElementById('settingsLink').addEventListener('click', function (e) {
    e.preventDefault();
    settingsPanel.classList.toggle('open');
    if (settingsPanel.classList.contains('open')) updateSettingsPanel();
  });

  document.getElementById('signInBtn').addEventListener('click', function () {
    var email    = document.getElementById('emailInput').value.trim();
    var password = document.getElementById('passwordInput').value;
    var statusEl = document.getElementById('settingsStatus');
    if (!email || !password) {
      statusEl.textContent = 'Email and password required.';
      statusEl.className = 'status error';
      return;
    }
    statusEl.textContent = 'Signing in…';
    statusEl.className = 'status ok';
    fetch(SB_AUTH + '/token?grant_type=password', {
      method: 'POST',
      headers: { 'apikey': SB_ANON, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password })
    }).then(function (r) {
      return r.json().then(function (d) { if (!r.ok) throw new Error(d.error_description || d.msg || r.status); return d; });
    }).then(function (d) {
      localStorage.setItem(TOKEN_KEY, d.access_token);
      var name = (d.user && d.user.user_metadata && d.user.user_metadata.name) || (d.user && d.user.email ? d.user.email.split('@')[0] : 'member');
      localStorage.setItem('daybook-author', name);
      settingsPanel.classList.remove('open');
      location.reload();
    }).catch(function (e) {
      statusEl.textContent = 'Sign-in failed: ' + e.message;
      statusEl.className = 'status error';
    });
  });

  document.getElementById('signOutBtn').addEventListener('click', function () {
    localStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem('daybook-author');
    location.reload();
  });

  /* ── state ── */
  var allItems = [];
  var activeStage = 'all';
  var isObserver = false;

  /* ── stage strip ── */
  document.getElementById('stageStrip').addEventListener('click', function (e) {
    var pill = e.target.closest('.stage-pill');
    if (!pill) return;
    activeStage = pill.dataset.stage;
    document.querySelectorAll('.stage-pill').forEach(function (p) {
      p.classList.toggle('active', p.dataset.stage === activeStage);
    });
    renderItems();
  });

  /* ── create form toggle ── */
  document.getElementById('createToggle').addEventListener('click', function (e) {
    e.preventDefault();
    document.getElementById('createForm').classList.toggle('open');
  });
  document.getElementById('cancelCreate').addEventListener('click', function () {
    document.getElementById('createForm').classList.remove('open');
  });

  /* ── create work item ── */
  document.getElementById('createBtn').addEventListener('click', function () {
    var token = localStorage.getItem(TOKEN_KEY);
    if (!token) { setStatus('No session. Open settings to sign in.', 'error'); return; }
    var title = document.getElementById('wTitle').value.trim();
    var kind  = document.getElementById('wKind').value;
    var desc  = document.getElementById('wDesc').value.trim();
    if (!title) { setStatus('Title is required.', 'error'); return; }
    var author = localStorage.getItem('daybook-author') || 'member';
    var now = new Date().toISOString();
    var slug = title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,40);
    var path = 'daybook/work/' + now.slice(0,10) + '-' + slug;

    var payload = {
      path:        path,
      kind:        kind,
      title:       title,
      stage:       'captured',
      created_by:  author,
      created_at:  now,
      description: desc || '',
      transitions: []
    };

    fetch(SB_REST + '/daybook_work_items', {
      method: 'POST',
      headers: Object.assign(sbHeaders(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(payload)
    }).then(function (r) {
      if (!r.ok) return r.json().then(function (d) { throw new Error(d.message || r.status); });
      return r.json();
    }).then(function (result) {
      var note = Array.isArray(result) ? result[0] : result;
      setStatus('Work item captured.', 'ok');
      document.getElementById('createForm').classList.remove('open');
      document.getElementById('wTitle').value = '';
      document.getElementById('wDesc').value = '';
      allItems.unshift(note);
      renderItems();
    }).catch(function (err) {
      setStatus('Error: ' + err.message, 'error');
    });
  });

  /* ── stage advance ── */
  function advanceStage(item, toStage) {
    var token = localStorage.getItem(TOKEN_KEY);
    if (!token) { setStatus('No session.', 'error'); return; }
    var author = localStorage.getItem('daybook-author') || 'member';
    var now = new Date().toISOString();
    var fromStage = item.stage || 'captured';
    var transition = { from: fromStage, to: toStage, by: author, at: now };
    var transitions = (item.transitions || []).concat([transition]);

    var patch = { stage: toStage, transitions: transitions };
    if (toStage === 'held' && !item.assignee) patch.assignee = author;
    if (toStage === 'resolved') { patch.resolved_at = now; patch.resolved_by = author; }
    if (toStage === 'composted') { patch.composted_at = now; patch.composted_by = author; }

    fetch(SB_REST + '/daybook_work_items?path=eq.' + encodeURIComponent(item.path), {
      method: 'PATCH',
      headers: Object.assign(sbHeaders(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(patch)
    }).then(function (r) {
      if (!r.ok) return r.json().then(function (d) { throw new Error(d.message || r.status); });
      return r.json();
    }).then(function (result) {
      var updated = Array.isArray(result) ? result[0] : result;
      setStatus('Moved to ' + toStage + '.', 'ok');
      var idx = allItems.findIndex(function (x) { return x.path === item.path; });
      if (idx > -1) allItems[idx] = updated;
      renderItems();
    }).catch(function (err) {
      setStatus('Error: ' + err.message, 'error');
    });
  }

  /* ── build card ── */
  function buildCard(item) {
    var stage = item.stage || 'captured';
    var col = STAGE_COLORS[stage] || '#888';
    var nexts = NEXT_STAGES[stage] || [];

    var card = document.createElement('div');
    card.className = 'item-card';
    card.dataset.stage = stage;

    var header = document.createElement('div');
    header.className = 'item-header';

    var titleEl = document.createElement('div');
    titleEl.className = 'item-title';
    titleEl.textContent = item.title || item.path;
    header.appendChild(titleEl);

    var kindEl = document.createElement('div');
    kindEl.className = 'item-kind';
    kindEl.textContent = item.kind || 'task';
    header.appendChild(kindEl);

    var stageEl = document.createElement('div');
    stageEl.className = 'item-stage-tag';
    stageEl.style.background = col;
    stageEl.textContent = stage;
    header.appendChild(stageEl);
    card.appendChild(header);

    var descText = item.description || item.content || '';
    if (descText && descText.trim()) {
      var desc = document.createElement('div');
      desc.className = 'item-desc';
      desc.innerHTML = typeof marked !== 'undefined' ? marked.parse(descText) : descText;
      card.appendChild(desc);
    }

    var metaEl = document.createElement('div');
    metaEl.className = 'item-meta';
    var parts = [];
    if (item.created_by) parts.push('by ' + item.created_by);
    if (item.created_at) parts.push(new Date(item.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }));
    if (item.assignee) parts.push('assignee: ' + item.assignee);
    metaEl.textContent = parts.join(' · ');
    card.appendChild(metaEl);

    if (!isObserver && nexts.length > 0) {
      var actions = document.createElement('div');
      actions.className = 'item-actions';

      nexts.forEach(function (ns) {
        var btn = document.createElement('button');
        btn.className = 'stage-btn ' + (ns === 'composted' ? 'retreat' : 'advance');
        btn.textContent = ns === stage ? ns : '→ ' + ns;
        btn.addEventListener('click', function () {
          if (ns === 'composted') {
            if (!confirm('Mark this item as composted (retired without resolution)?')) return;
          }
          advanceStage(item, ns);
        });
        actions.appendChild(btn);
      });

      card.appendChild(actions);
    }

    // transition history
    var transitions = item.transitions || [];
    if (transitions.length > 0) {
      var histEl = document.createElement('div');
      histEl.className = 'transitions';
      var toggleEl = document.createElement('button');
      toggleEl.className = 'transitions-toggle';
      toggleEl.textContent = transitions.length + ' stage move' + (transitions.length !== 1 ? 's' : '');
      var listEl = document.createElement('div');
      listEl.className = 'transitions-list';
      transitions.forEach(function (t) {
        var row = document.createElement('div');
        row.className = 'transition-row';
        row.innerHTML =
          '<span class="transition-from">' + (t.from || '—') + '</span>' +
          '<span class="transition-arrow">→</span>' +
          '<span class="transition-to">' + t.to + '</span>' +
          '<span class="transition-by">by ' + t.by + '</span>' +
          '<span class="transition-at">' + new Date(t.at).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) + '</span>';
        listEl.appendChild(row);
      });
      toggleEl.addEventListener('click', function () { listEl.classList.toggle('open'); });
      histEl.appendChild(toggleEl);
      histEl.appendChild(listEl);
      card.appendChild(histEl);
    }

    return card;
  }

  /* ── render items ── */
  function renderItems() {
    var wrap = document.getElementById('itemsWrap');
    wrap.innerHTML = '';

    var filtered = activeStage === 'all'
      ? allItems.filter(function (i) { return !TERMINALS.includes(i.stage); })
      : allItems.filter(function (i) { return i.stage === activeStage; });

    document.getElementById('itemCount').textContent =
      filtered.length === 0 ? 'no items' :
      filtered.length === 1 ? '1 item' : filtered.length + ' items';

    if (!filtered.length) {
      var empty = document.createElement('div');
      empty.className = 'empty-msg';
      empty.textContent = activeStage === 'all' ? 'No active work items.' : 'No items in this stage.';
      wrap.appendChild(empty);
      return;
    }

    filtered.forEach(function (item) { wrap.appendChild(buildCard(item)); });
  }

  /* ── fetch items ── */
  function fetchItems(token) {
    return fetch(SB_REST + '/daybook_work_items?order=created_at.desc&limit=200', {
      headers: sbHeaders(token)
    }).then(function (r) {
      if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
      return r.json();
    }).then(function (data) {
      return Array.isArray(data) ? data : [];
    });
  }

  /* ── init ── */
  var userToken = localStorage.getItem(TOKEN_KEY);
  isObserver = !userToken;

  if (isObserver) {
    document.getElementById('observerNotice').style.display = 'block';
    document.getElementById('writeLink').style.display = 'none';
  } else {
    document.getElementById('createToggle').style.display = '';
  }

  fetchItems(userToken).then(function (items) {
    // sort: active first (by stage order), then by created_at desc within stage
    var stageOrder = {};
    STAGES.forEach(function (s, i) { stageOrder[s] = i; });
    items.sort(function (a, b) {
      var sa = a.stage || 'captured';
      var sb = b.stage || 'captured';
      if (sa !== sb) return (stageOrder[sa] || 0) - (stageOrder[sb] || 0);
      var ta = a.created_at || '';
      var tb = b.created_at || '';
      return tb.localeCompare(ta);
    });
    allItems = items;
    document.getElementById('loadingMsg').remove();
    renderItems();
  }).catch(function (err) {
    document.getElementById('loadingMsg').textContent = 'Could not load work items: ' + err.message;
  });

})();
</script>
</body>
